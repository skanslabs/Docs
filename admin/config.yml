# Sveltia CMS configuration for Skans docs.
# Editor lives at https://docs.skanslabs.com/admin — sign in with the
# "Sign In with Token" button (GitHub personal access token, repo scope).
# No OAuth app / auth relay needed.
#
# Content model matches the generator: Markdown files with frontmatter
# (title, eyebrow, description) + body, under content/<version>/<group>/.

backend:
  name: github
  repo: skanslabs/Docs
  branch: main

# where drag-and-drop image uploads land (per current version)
media_folder: "content/media"
public_folder: "/media"

# nicer editing experience
editor:
  preview: false

collections:
  - name: getting-started
    label: "Getting Started"
    label_singular: "Page"
    folder: "content/2.0/getting-started"
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: eyebrow, label: Eyebrow, widget: string, required: false, default: "Getting Started" }
      - { name: description, label: Description (SEO), widget: text, required: false }
      - { name: body, label: Body, widget: markdown }

  - name: how-tos
    label: "How-tos"
    label_singular: "How-to"
    folder: "content/2.0/how-tos"
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: eyebrow, label: Eyebrow, widget: string, required: false, default: "How-tos" }
      - { name: description, label: Description (SEO), widget: text, required: false }
      - { name: body, label: Body, widget: markdown }

  - name: blog
    label: "Blog"
    label_singular: "Post"
    folder: "content/blog"
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}}  ·  {{date}}"
    sortable_fields: [date, title]
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: author, label: Author, widget: string, default: "Skans Labs" }
      - { name: category, label: Category, widget: select, options: ["Announcement", "How-to"], default: "Announcement" }
      - { name: excerpt, label: Excerpt, widget: text }
      - { name: cover, label: Cover image, widget: image, required: false, hint: "Optional. Leave empty for a branded gradient cover." }
      - { name: body, label: Body, widget: markdown }
